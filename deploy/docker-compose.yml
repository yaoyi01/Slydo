# Slydo docker-compose 部署
# 用法:
#   docker compose up -d
#   访问 http://服务器IP/
#   管理后台: http://服务器IP/admin/
#   默认管理员: admin / admin123456

networks:
  slydo-net:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  slydo_wiki:
  slydo_watch:

services:
  # ─── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_DB: slydo
      POSTGRES_USER: slydo
      POSTGRES_PASSWORD: slydo_docker_2026
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-slydo.sql:/docker-entrypoint-initdb.d/init-slydo.sql
    networks:
      - slydo-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slydo"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Qdrant 向量库 ─────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - slydo-net

  # ─── Slydo API ─────────────────────────────────────────────
  api:
    image: slydo-api:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://slydo:***@postgres:5432/slydo
      JWT_SECRET_KEY: slydo-jwt-secret-deploy-2026
      # API Keys 通过 .env 文件传入，不要写死在 docker-compose.yml 中
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      LLM_MODEL: deepseek-v4-flash
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: https://dashscope.aliyuncs.com/api/v1
      DASHSCOPE_VISION_MODEL: qwen3-vl-flash
      SLYDO_WIKI_PATH: /data/wiki
      QDRANT_URL: http://qdrant:6333
      DEBUG: "false"
    volumes:
      - slydo_wiki:/data/wiki
      - slydo_watch:/root/.slydo/watch
    networks:
      - slydo-net

  # ─── Nginx 反代 ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - slydo-net
